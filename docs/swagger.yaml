basePath: /
definitions:
  model.BodyWeight:
    properties:
      date:
        type: string
      id:
        type: string
      logged_at:
        type: string
      unit:
        type: string
      weight:
        type: number
    type: object
  model.CatalogExercise:
    properties:
      category:
        type: string
      id:
        type: string
      mechanic:
        type: string
      modality:
        type: string
      name:
        type: string
      sort_order:
        type: integer
    type: object
  model.CreateBodyWeightRequest:
    properties:
      date:
        type: string
      unit:
        enum:
        - lb
        - kg
        type: string
      weight:
        type: number
    required:
    - date
    - unit
    - weight
    type: object
  model.CreateDayLogRequest:
    properties:
      date:
        type: string
      overrides:
        items:
          $ref: '#/definitions/model.CreateOverrideRequest'
        type: array
      session_notes:
        type: string
      set_logs:
        items:
          $ref: '#/definitions/model.CreateSetLogRequest'
        type: array
      subtype_id:
        type: string
      template_id:
        type: string
      type_id:
        type: string
    required:
    - date
    - subtype_id
    - type_id
    type: object
  model.CreateExerciseRequest:
    properties:
      catalog_id:
        type: string
      duration_minutes:
        type: integer
      intensity:
        enum:
        - easy
        - moderate
        - hard
        type: string
      name:
        maxLength: 200
        minLength: 1
        type: string
      notes:
        type: string
      reps:
        type: integer
      rest_seconds:
        type: integer
      sets:
        type: integer
      weight:
        type: number
    required:
    - name
    type: object
  model.CreateOverrideRequest:
    properties:
      actual_reps:
        type: integer
      actual_sets:
        type: integer
      actual_weight:
        type: number
      exercise_id:
        type: string
      notes:
        type: string
      skipped:
        type: boolean
    required:
    - exercise_id
    type: object
  model.CreateSetLogRequest:
    properties:
      actual_reps:
        type: integer
      actual_weight:
        type: number
      completed:
        type: boolean
      duration_seconds:
        type: integer
      exercise_id:
        type: string
      set_index:
        minimum: 1
        type: integer
      target_reps:
        type: integer
      target_weight:
        type: number
    required:
    - exercise_id
    - set_index
    type: object
  model.CreateTemplateRequest:
    properties:
      exercises:
        items:
          $ref: '#/definitions/model.CreateExerciseRequest'
        type: array
      name:
        maxLength: 100
        minLength: 1
        type: string
      subtype_id:
        type: string
      type_id:
        type: string
    required:
    - name
    - subtype_id
    - type_id
    type: object
  model.DayLog:
    properties:
      date:
        type: string
      id:
        type: string
      logged_at:
        type: string
      overrides:
        items:
          $ref: '#/definitions/model.ExerciseOverride'
        type: array
      session_notes:
        type: string
      set_logs:
        items:
          $ref: '#/definitions/model.SetLog'
        type: array
      subtype_id:
        type: string
      template:
        $ref: '#/definitions/model.WorkoutTemplate'
      template_id:
        type: string
      template_name:
        type: string
      type_id:
        type: string
    required:
    - subtype_id
    - type_id
    type: object
  model.DayLogSummary:
    properties:
      date:
        type: string
      id:
        type: string
      logged_at:
        type: string
      session_notes:
        type: string
      subtype_id:
        type: string
      template_id:
        type: string
      template_name:
        type: string
      type_id:
        type: string
    type: object
  model.Exercise:
    properties:
      catalog_id:
        type: string
      duration_minutes:
        type: integer
      id:
        type: string
      intensity:
        type: string
      name:
        maxLength: 200
        minLength: 1
        type: string
      notes:
        type: string
      reps:
        type: integer
      rest_seconds:
        type: integer
      sets:
        type: integer
      sort_order:
        type: integer
      weight:
        type: number
    required:
    - name
    type: object
  model.ExerciseHistory:
    properties:
      date:
        type: string
      exercise_id:
        type: string
      sets:
        items:
          $ref: '#/definitions/model.SetLog'
        type: array
    type: object
  model.ExerciseOverride:
    properties:
      actual_reps:
        type: integer
      actual_sets:
        type: integer
      actual_weight:
        type: number
      exercise_id:
        type: string
      id:
        type: string
      notes:
        type: string
      skipped:
        type: boolean
    required:
    - exercise_id
    type: object
  model.PlanOverride:
    properties:
      date:
        type: string
      rest:
        type: boolean
      template_id:
        type: string
    required:
    - date
    type: object
  model.PlanResponse:
    properties:
      overrides:
        items:
          $ref: '#/definitions/model.PlanOverride'
        type: array
      weekly:
        items:
          $ref: '#/definitions/model.WeeklyPlanDay'
        type: array
    type: object
  model.PutPlanOverrideRequest:
    properties:
      rest:
        type: boolean
      template_id:
        type: string
    type: object
  model.PutWeeklyPlanRequest:
    properties:
      days:
        items:
          $ref: '#/definitions/model.WeeklyPlanDay'
        type: array
    type: object
  model.SetLog:
    properties:
      actual_reps:
        type: integer
      actual_weight:
        type: number
      completed:
        type: boolean
      duration_seconds:
        type: integer
      exercise_id:
        type: string
      id:
        type: string
      set_index:
        minimum: 1
        type: integer
      target_reps:
        type: integer
      target_weight:
        type: number
    required:
    - exercise_id
    - set_index
    type: object
  model.StatsSummary:
    properties:
      streak_days:
        type: integer
      streak_weeks:
        type: integer
      this_week:
        $ref: '#/definitions/model.WeekProgress'
      total_workouts:
        type: integer
    type: object
  model.SubtypeDistribution:
    properties:
      count:
        type: integer
      subtype_id:
        type: string
    type: object
  model.TemplateSummary:
    properties:
      created_at:
        type: string
      exercise_count:
        type: integer
      exercises_preview:
        items:
          type: string
        type: array
      id:
        type: string
      name:
        type: string
      subtype_id:
        type: string
      type_id:
        type: string
      updated_at:
        type: string
    type: object
  model.TypeDistribution:
    properties:
      count:
        type: integer
      subtypes:
        items:
          $ref: '#/definitions/model.SubtypeDistribution'
        type: array
      type_id:
        type: string
    type: object
  model.UpdateDayLogRequest:
    properties:
      overrides:
        items:
          $ref: '#/definitions/model.CreateOverrideRequest'
        type: array
      session_notes:
        type: string
      set_logs:
        items:
          $ref: '#/definitions/model.CreateSetLogRequest'
        type: array
      subtype_id:
        type: string
      template_id:
        type: string
      type_id:
        type: string
    type: object
  model.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      display_name:
        maxLength: 50
        minLength: 2
        type: string
    type: object
  model.UserProfile:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      id:
        type: string
      onboarding_completed:
        type: boolean
    type: object
  model.UserSettings:
    properties:
      weekly_goal:
        maximum: 7
        minimum: 1
        type: integer
      weight_unit:
        enum:
        - lb
        - kg
        type: string
    required:
    - weekly_goal
    - weight_unit
    type: object
  model.WeekProgress:
    properties:
      completed:
        type: integer
      goal:
        type: integer
    type: object
  model.WeeklyPlanDay:
    properties:
      rest:
        type: boolean
      template_id:
        type: string
      weekday:
        maximum: 7
        minimum: 1
        type: integer
    required:
    - weekday
    type: object
  model.WorkoutTemplate:
    properties:
      created_at:
        type: string
      exercises:
        items:
          $ref: '#/definitions/model.Exercise'
        type: array
      id:
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      subtype_id:
        type: string
      type_id:
        type: string
      updated_at:
        type: string
    required:
    - name
    - subtype_id
    - type_id
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for the Gym Pulse workout tracking app.
  title: Gym Pulse API
  version: "1.0"
paths:
  /api/v1/body/weight:
    get:
      description: Returns all body weight entries for the authenticated user, ordered
        by date descending.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.BodyWeight'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List body weight entries
      tags:
      - body-weight
    post:
      consumes:
      - application/json
      description: Creates or updates a body weight entry for the given date. Only
        one entry per date is kept.
      parameters:
      - description: Body weight payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateBodyWeightRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.BodyWeight'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Log a body weight entry
      tags:
      - body-weight
  /api/v1/body/weight/{id}:
    delete:
      description: Permanently deletes a body weight entry by its ID.
      parameters:
      - description: Body weight entry UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a body weight entry
      tags:
      - body-weight
  /api/v1/exercises:
    get:
      description: Returns the curated exercise catalog, optionally filtered by workout
        type category.
      parameters:
      - description: Workout type id to filter by (e.g. push, pull, legs, cardio)
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/model.CatalogExercise'
              type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List catalog exercises
      tags:
      - exercises
  /api/v1/exercises/history:
    get:
      description: Returns, for each comma-separated exercise id, the completed sets
        from the most recent day that exercise was performed — powers "last time you
        did X" hints.
      parameters:
      - description: Comma-separated exercise UUIDs
        in: query
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.ExerciseHistory'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Most recent completed sets per exercise
      tags:
      - logs
  /api/v1/logs:
    get:
      description: Returns all day logs in the week containing the given Monday date.
      parameters:
      - description: Week start date (Monday) in YYYY-MM-DD format
        in: query
        name: week
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.DayLogSummary'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List day logs for a week
      tags:
      - logs
    post:
      consumes:
      - application/json
      description: Logs a workout session for the given date. Only one log per date
        is allowed.
      parameters:
      - description: Day log payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateDayLogRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.DayLog'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: A log already exists for this date
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a day log
      tags:
      - logs
  /api/v1/logs/{date}:
    delete:
      description: Permanently deletes the day log for the given date.
      parameters:
      - description: Date in YYYY-MM-DD format
        in: path
        name: date
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a day log
      tags:
      - logs
    get:
      description: Returns the full day log for a specific date including template
        and overrides.
      parameters:
      - description: Date in YYYY-MM-DD format
        in: path
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DayLog'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a day log
      tags:
      - logs
    put:
      consumes:
      - application/json
      description: Updates session notes and replaces the exercise override list for
        the given date.
      parameters:
      - description: Date in YYYY-MM-DD format
        in: path
        name: date
        required: true
        type: string
      - description: Update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdateDayLogRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DayLog'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a day log
      tags:
      - logs
  /api/v1/plan:
    get:
      description: 'Returns the recurring weekly plan plus per-date overrides in the
        requested window (default: ±4 weeks around today). Effective-day resolution
        is the client''s responsibility.'
      parameters:
      - description: Window start (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: Window end (YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PlanResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get the training plan
      tags:
      - plan
  /api/v1/plan/overrides/{date}:
    delete:
      description: Deletes the override; the date falls back to the recurring weekly
        plan.
      parameters:
      - description: Date (YYYY-MM-DD)
        in: path
        name: date
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove a one-day plan override
      tags:
      - plan
    put:
      consumes:
      - application/json
      description: Overrides the weekly plan for one date without changing the recurring
        plan.
      parameters:
      - description: Date (YYYY-MM-DD)
        in: path
        name: date
        required: true
        type: string
      - description: Override
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.PutPlanOverrideRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upsert a one-day plan override
      tags:
      - plan
  /api/v1/plan/weekly:
    put:
      consumes:
      - application/json
      description: Fully replaces the recurring plan. Sparse is allowed; weekdays
        missing from the request become unplanned.
      parameters:
      - description: Weekly plan
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.PutWeeklyPlanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.WeeklyPlanDay'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Replace the recurring weekly plan
      tags:
      - plan
  /api/v1/profile:
    get:
      description: Returns the authenticated user's profile (display name, avatar,
        onboarding status).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UserProfile'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - profile
    put:
      consumes:
      - application/json
      description: Updates display name and avatar URL for the authenticated user.
        Sets onboarding_completed to true.
      parameters:
      - description: Profile update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UserProfile'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - profile
  /api/v1/settings:
    get:
      description: Returns the authenticated user's settings (weight unit, weekly
        goal).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UserSettings'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user settings
      tags:
      - settings
    put:
      consumes:
      - application/json
      description: Updates weight unit and weekly goal for the authenticated user.
      parameters:
      - description: Settings payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UserSettings'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UserSettings'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user settings
      tags:
      - settings
  /api/v1/stats/distribution:
    get:
      description: Returns a breakdown of workout counts by type and subtype.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/model.TypeDistribution'
              type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get workout type distribution
      tags:
      - stats
  /api/v1/stats/summary:
    get:
      description: Returns this week's progress, current streak, and total workout
        count.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.StatsSummary'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
